<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Download</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f0f0f0;
    }

    .download-btn {
      width: 200px;
      height: 55px;
      background-color: #007bff;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.5px;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .download-btn:hover  { background-color: #0056b3; }
    .download-btn:active { background-color: #004494; }
  </style>
</head>
<body>
  <a class="download-btn" href="files/SpotifySetup.zip" download>
    &#11015; Download
  </a>

</body>
</html>
